services:
  backend:
    build:
      context: ./backend
    image: chat-backend:dev
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.0-flash}
      - CORS_ORIGIN=http://localhost:3000
      # Configurable persona (ExpertConfigService). Use the "- VAR" form (no
      # "=") so an unset var on the host stays unset inside the container
      # instead of being passed through as an empty string, which the env
      # validator would reject. EXPERT_DOMAIN and EXPERT_DESCRIPTION are
      # required by the validator when NODE_ENV=production (which is always
      # true here), so either set them in .env or remove the prod gate in
      # backend/src/config/env.validation.ts.
      - EXPERT_DOMAIN
      - EXPERT_DESCRIPTION
      - OFF_TOPIC_MESSAGE
      - APP_TITLE
      - APP_SUBTITLE
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    image: chat-frontend:dev
    environment:
      - NODE_ENV=production
      - NEST_API_URL=http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
